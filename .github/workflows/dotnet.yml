name: Release on tag

on:
  push:
    tags: ['*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
        default: 'v6.0.0'
      commit:
        description: 'Commit-ish to tag'
        required: false

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare
    runs-on: windows-latest
    outputs:
      version: ${{ steps.release.outputs.VERSION }}
      build_ref: ${{ steps.release.outputs.BUILD_REF }}
      build_sha: ${{ steps.resolve_sha.outputs.BUILD_SHA }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve version and build ref
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            INPUT_COMMIT="${{ github.event.inputs.commit }}"

            if [ -n "$INPUT_COMMIT" ]; then
              BUILD_REF="$INPUT_COMMIT"
            elif git rev-parse -q --verify "refs/tags/$VERSION^{commit}" >/dev/null; then
              BUILD_REF="refs/tags/$VERSION"
            else
              echo "Error: provide 'commit' when version tag '$VERSION' does not exist yet." >&2
              exit 1
            fi
          else
            VERSION="${GITHUB_REF#refs/tags/}"
            BUILD_REF="${GITHUB_REF}"
          fi

          if [ -z "$VERSION" ]; then
            echo "Error: no tag found in ref or input!" >&2
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "BUILD_REF=$BUILD_REF" >> "$GITHUB_OUTPUT"
          echo "Building version '$VERSION' from '$BUILD_REF'"

      - name: Resolve source commit
        id: resolve_sha
        shell: bash
        run: |
          BUILD_SHA="$(git rev-parse "${BUILD_REF}^{commit}")"
          echo "BUILD_SHA=$BUILD_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved build commit '$BUILD_SHA' from '$BUILD_REF'"
        env:
          BUILD_REF: ${{ steps.release.outputs.BUILD_REF }}

  build_net_install:
    name: Build net-install package
    runs-on: windows-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.build_sha }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 10.x

      - name: Publish install (framework-dependent)
        run: |
          dotnet publish AutoMidiPlayer.WPF -r win-x64 -c Release -o .\install-fd --self-contained false -p:PublishSingleFile=false

      - name: Inspect install output
        run: |
          Get-ChildItem .\install-fd -Recurse | Select Name,Length

      - name: Zip net-install
        run: |
          if (Test-Path .\install-fd) { Get-ChildItem .\install-fd\*.pdb -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue }
          7z a AutoMidiPlayer_${{ needs.prepare.outputs.version }}_win-x64-net-install.zip .\install-fd\* -mx9

      - name: Upload net-install artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: net-install-zip
          path: AutoMidiPlayer_${{ needs.prepare.outputs.version }}_win-x64-net-install.zip
          if-no-files-found: error
          retention-days: 1

  build_portable:
    name: Build portable package
    runs-on: windows-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.build_sha }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 10.x

      - name: Publish portable (self-contained)
        run: |
          dotnet publish AutoMidiPlayer.WPF -r win-x64 -c Release -o .\portable --self-contained true -p:PublishSingleFile=true

      - name: Inspect portable output
        run: |
          Get-ChildItem .\portable -Recurse | Select Name,Length

      - name: Zip portable executable
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $portableExe = ".\portable\Auto MIDI Player.exe"
          $stagedExe = ".\Auto MIDI Player.exe"
          $portableArchive = ".\AutoMidiPlayer_${version}_win-x64-portable.zip"

          if (-not (Test-Path $portableExe)) { throw "Missing portable executable: $portableExe" }

          Copy-Item $portableExe $stagedExe -Force
          if (Test-Path $portableArchive) { Remove-Item $portableArchive -Force }
          7z a $portableArchive "`"$stagedExe`"" -mx9
          Remove-Item "`"$stagedExe`"" -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: portable-zip
          path: AutoMidiPlayer_${{ needs.prepare.outputs.version }}_win-x64-portable.zip
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    runs-on: windows-latest
    needs:
      - prepare
      - build_net_install
      - build_portable

    steps:
      - name: Download net-install artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: net-install-zip
          path: artifacts/net-install

      - name: Download portable artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: portable-zip
          path: artifacts/portable

      - name: Verify assets and stage release files
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $netArchive = ".\artifacts\net-install\AutoMidiPlayer_${version}_win-x64-net-install.zip"
          $portableArchive = ".\artifacts\portable\AutoMidiPlayer_${version}_win-x64-portable.zip"

          if (-not (Test-Path $netArchive)) { throw "Missing net-install archive: $netArchive" }
          if (-not (Test-Path $portableArchive)) { throw "Missing portable archive: $portableArchive" }

          $netItem = Get-Item $netArchive
          $portableItem = Get-Item $portableArchive
          $netHash = (Get-FileHash $netArchive -Algorithm SHA256).Hash
          $portableHash = (Get-FileHash $portableArchive -Algorithm SHA256).Hash

          "net-install zip size: $($netItem.Length)"
          "portable exe zip size: $($portableItem.Length)"
          "net-install zip sha256: $netHash"
          "portable exe zip sha256: $portableHash"

          Copy-Item $netArchive ".\AutoMidiPlayer_${version}_win-x64-net-install.zip" -Force
          Copy-Item $portableArchive ".\AutoMidiPlayer_${version}_win-x64-portable.zip" -Force

          # Create checksums.txt
          $checksums = "$netHash  AutoMidiPlayer_${version}_win-x64-net-install.zip`r`n$portableHash  AutoMidiPlayer_${version}_win-x64-portable.zip"
          Set-Content -Path ".\checksums.txt" -Value $checksums -Encoding UTF8

      - name: Inspect release assets
        run: |
          Get-ChildItem .\AutoMidiPlayer_*_win-x64_* | Select Name,Length

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ needs.prepare.outputs.build_sha }}
          files: |
             AutoMidiPlayer_${{ needs.prepare.outputs.version }}_win-x64-net-install.zip
             AutoMidiPlayer_${{ needs.prepare.outputs.version }}_win-x64-portable.zip
             checksums.txt
          overwrite_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
